<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebastian Ventas</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    text-align: center;
}

/* Encabezado */
header {
    padding: 30px;
    background: linear-gradient(90deg, #000, #1a1a1a, #000);
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

h1 {
    margin: 0;
    font-size: 38px;
    color: #fff;
    text-shadow: 0 0 10px #fff, 0 0 20px #aaa;
}

/* Línea brillante */
h1::after {
    content: "";
    display: block;
    width: 120px;
    height: 3px;
    margin: 10px auto;
    background: linear-gradient(90deg, transparent, #fff, transparent);
}

/* Secciones */
.section {
    padding: 30px;
    background: rgba(0,0,0,0.7);
    margin: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(255,255,255,0.05);
    transition: 0.3s;
}

.section:hover {
    box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

/* Descripción */
.desc {
    max-width: 500px;
    margin: auto;
    color: #ccc;
}

/* BOTÓN PRO */
.btn {
    display: inline-block;
    margin: 15px;
    padding: 14px 25px;
    background: linear-gradient(45deg, #ffffff, #888);
    color: black;
    text-decoration: none;
    border-radius: 12px;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
}

.btn:hover {
    background: linear-gradient(45deg, #fff, #ccc);
    transform: scale(1.08);
    box-shadow: 0 0 20px #fff;
}

/* Galería */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.gallery img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    filter: grayscale(100%);
    transition: 0.4s;
    box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

.gallery img:hover {
    filter: grayscale(0%);
    transform: scale(1.08);
    box-shadow: 0 0 20px #fff;
}

/* Botón flotante WhatsApp */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
    box-shadow: 0 0 15px #25D366;
    transition: 0.3s;
}

.whatsapp-float:hover {
    transform: scale(1.1);
}

/* Footer */
footer {
    padding: 20px;
    background: #000;
    margin-top: 20px;
    color: #aaa;
}
</style>

</head>

<body>

<header>
    <h1>SEBASTIAN VENTAS</h1>
</header>

<div class="section">
    <h2>Descripción</h2>
    <p class="desc">
        Venta de cuentas de Free Fire 🔥 <br>
        Acceso completo, seguras y entrega rápida. <br>
        Atención directa por WhatsApp.
    </p>

    <a class="btn" href="https://wa.me/573054605567" target="_blank">
        📲 Contactar por WhatsApp
    </a>

    <p>📞 +57 305 460 5567</p>
    <p>💳 Método de pago: Nequi</p>
</div>

<div class="section">
    <h2>Referencias</h2>
    <div class="gallery">
        <img src="foto1.jpg" alt="ref1">
        <img src="foto2.jpg" alt="ref2">
        <img src="foto3.jpg" alt="ref3">
        <img src="foto4.jpg" alt="ref4">
    </div>
</div>

<!-- BOTÓN FLOTANTE -->
<a href="https://wa.me/573054605567" class="whatsapp-float" target="_blank">
💬
</a>

<footer>
    © 2026 Sebastian Ventas
</footer>

</body>
</html>
